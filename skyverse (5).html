<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyVerse</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Exo+2:ital,wght@0,300;0,400;1,300&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Exo 2',sans-serif;color:#fff;}
    #c{display:block;width:100%;height:100%;cursor:grab;}
    #c:active{cursor:grabbing;}

    /* LOADING */
    #loading{position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 1s ease;}
    #loading.fade{opacity:0;pointer-events:none;}
    #load-title{font-family:'Orbitron',monospace;font-size:clamp(28px,6vw,52px);letter-spacing:10px;color:#fff;text-transform:uppercase;text-shadow:0 0 50px rgba(100,160,255,0.9),0 0 100px rgba(100,160,255,0.3);}
    #load-sub{font-size:11px;letter-spacing:4px;color:rgba(150,190,255,0.45);text-transform:uppercase;}
    #load-bar-wrap{width:200px;height:1px;background:rgba(100,150,255,0.15);border-radius:2px;overflow:hidden;}
    #load-bar{height:100%;width:0%;background:linear-gradient(to right,#2244cc,#66aaff);transition:width 0.4s ease;}
    #load-status{font-size:9px;letter-spacing:2px;color:rgba(100,150,255,0.4);}

    /* TOP BAR */
    #ui-top{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:linear-gradient(to bottom,rgba(0,2,14,0.85),transparent);pointer-events:none;}
    #logo{font-family:'Orbitron',monospace;font-size:17px;letter-spacing:5px;color:#fff;text-shadow:0 0 20px rgba(100,160,255,0.5);pointer-events:all;cursor:pointer;}
    #top-right{display:flex;gap:8px;pointer-events:all;align-items:center;}
    .top-btn{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1.5px;padding:7px 14px;border-radius:5px;cursor:pointer;border:0.5px solid rgba(100,150,255,0.28);background:rgba(4,8,28,0.75);color:rgba(150,190,255,0.75);transition:all 0.2s;text-transform:uppercase;backdrop-filter:blur(8px);}
    .top-btn:hover{border-color:rgba(100,180,255,0.65);color:#fff;background:rgba(18,45,120,0.8);}
    .top-btn.on{background:rgba(20,55,160,0.85);border-color:rgba(100,180,255,0.85);color:#fff;}

    /* SPEED PANEL */
    #speed-panel{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:50;display:flex;align-items:center;gap:10px;background:rgba(3,7,22,0.88);backdrop-filter:blur(14px);border:0.5px solid rgba(80,130,255,0.22);border-radius:10px;padding:10px 16px;}
    .spd-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid rgba(100,150,255,0.28);background:rgba(12,24,80,0.7);color:rgba(150,190,255,0.8);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;user-select:none;}
    .spd-btn:hover{background:rgba(28,55,150,0.85);color:#fff;}
    #speed-val{font-family:'Orbitron',monospace;font-size:10px;color:#88bbff;min-width:70px;text-align:center;letter-spacing:1px;}
    #pause-btn{padding:6px 16px;border-radius:6px;border:0.5px solid rgba(100,150,255,0.3);background:rgba(12,24,80,0.7);color:rgba(150,190,255,0.8);cursor:pointer;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:2px;transition:all 0.2s;text-transform:uppercase;}
    #pause-btn:hover{color:#fff;background:rgba(28,55,150,0.85);}
    #pause-btn.paused{border-color:rgba(80,220,120,0.5);color:rgba(100,230,140,0.9);}

    /* TOOLTIP */
    #tooltip{position:fixed;z-index:60;pointer-events:none;background:rgba(3,7,22,0.92);backdrop-filter:blur(10px);border:0.5px solid rgba(80,130,255,0.32);border-radius:8px;padding:8px 14px;display:none;transform:translate(-50%,-120%);}
    #tt-name{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:#c8e0ff;margin-bottom:2px;}
    #tt-sub{font-size:11px;color:rgba(120,160,220,0.7);}

    /* PLANET MODAL */
    #planet-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,2,14,0.94);backdrop-filter:blur(18px);overflow-y:auto;animation:modal-in 0.35s ease;}
    #planet-modal.closing{animation:modal-out 0.25s ease forwards;}
    @keyframes modal-in{from{opacity:0;transform:scale(0.97);}to{opacity:1;transform:scale(1);}}
    @keyframes modal-out{from{opacity:1;}to{opacity:0;}}
    #modal-inner{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 20px 60px;}
    #modal-close{align-self:flex-end;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:rgba(150,190,255,0.65);background:rgba(15,35,90,0.5);border:0.5px solid rgba(100,150,255,0.3);border-radius:6px;padding:7px 18px;cursor:pointer;transition:all 0.2s;margin-bottom:18px;}
    #modal-close:hover{color:#fff;border-color:rgba(120,190,255,0.8);background:rgba(25,60,150,0.7);}
    #planet-stage{position:relative;width:min(380px,80vw);height:min(380px,80vw);margin-bottom:14px;}
    #atmo-glow{position:absolute;inset:-30px;border-radius:50%;pointer-events:none;z-index:0;animation:glow-pulse 3s ease-in-out infinite;}
    @keyframes glow-pulse{0%,100%{opacity:0.35;transform:scale(1);}50%{opacity:0.65;transform:scale(1.08);}}
    #three-canvas{width:100%!important;height:100%!important;border-radius:50%;display:block;position:relative;z-index:1;cursor:grab;touch-action:none;}
    #three-canvas:active{cursor:grabbing;}
    #planet-hint{font-size:9px;letter-spacing:2px;color:rgba(100,150,220,0.38);text-align:center;margin-bottom:14px;font-family:'Orbitron',monospace;}
    #modal-name{font-family:'Orbitron',monospace;font-size:clamp(24px,5vw,42px);letter-spacing:5px;color:#fff;text-align:center;margin-bottom:5px;text-shadow:0 0 30px rgba(120,180,255,0.6);}
    #modal-subtitle{font-size:13px;color:rgba(120,160,220,0.65);letter-spacing:2px;text-align:center;margin-bottom:22px;}
    #stat-strip{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:22px;width:min(740px,90vw);}
    .s-card{padding:8px 16px;background:rgba(8,16,50,0.65);border:0.5px solid rgba(80,130,255,0.18);border-radius:8px;text-align:center;}
    .s-label{font-size:8px;letter-spacing:2px;color:rgba(80,120,200,0.6);text-transform:uppercase;font-family:'Orbitron',monospace;display:block;margin-bottom:4px;}
    .s-val{font-size:12px;color:rgba(150,190,255,0.9);font-family:'Orbitron',monospace;}
    #modal-info{width:min(740px,90vw);background:rgba(3,7,22,0.9);border:0.5px solid rgba(80,130,255,0.25);border-radius:16px;overflow:hidden;backdrop-filter:blur(14px);}
    #modal-body{padding:20px 24px;display:flex;gap:22px;flex-wrap:wrap;}
    #modal-facts{flex:1;min-width:190px;}
    .fact-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;}
    .fact-dot{width:4px;height:4px;border-radius:50%;background:#2255bb;margin-top:8px;flex-shrink:0;box-shadow:0 0 5px rgba(40,90,200,0.8);}
    .fact-text{font-size:13px;color:rgba(155,183,228,0.88);line-height:1.65;}
    #modal-ai{flex:0 0 200px;border-left:0.5px solid rgba(80,130,255,0.16);padding-left:18px;}
    #modal-ai-label{font-size:9px;letter-spacing:2px;color:rgba(80,120,200,0.6);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    #modal-ai-label::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#2255ff;box-shadow:0 0 7px #2255ff;animation:ai-blink 2s infinite;}
    @keyframes ai-blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
    #modal-ai-text{font-size:12px;color:rgba(115,158,218,0.88);line-height:1.7;min-height:70px;font-style:italic;}
    .dp{width:6px;height:6px;border-radius:50%;background:#2255ff;animation:dp-pulse 1.2s infinite;display:inline-block;margin-right:3px;}
    .dp:nth-child(2){animation-delay:0.2s;}.dp:nth-child(3){animation-delay:0.4s;}
    @keyframes dp-pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}

    /* MOBILE */
    @media(max-width:600px){
      #logo{font-size:13px;letter-spacing:3px;}
      .top-btn{font-size:7px;padding:6px 10px;}
      #speed-panel{gap:7px;padding:8px 12px;}
      #modal-body{flex-direction:column;}
      #modal-ai{flex:none;border-left:none;border-top:0.5px solid rgba(80,130,255,0.16);padding-left:0;padding-top:14px;}
      #planet-stage{width:min(280px,78vw);height:min(280px,78vw);}
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div id="load-title">SkyVerse</div>
  <div id="load-sub">Loading the cosmos</div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
  <div id="load-status">Initialising...</div>
</div>

<!-- TOP BAR -->
<div id="ui-top">
  <div id="logo">SkyVerse</div>
  <div id="top-right">
    <div class="top-btn on" id="btn-orbits" onclick="toggleOrbits()">Orbits</div>
    <div class="top-btn" id="btn-labels" onclick="toggleLabels()">Labels</div>
    <div class="top-btn" id="btn-reset" onclick="resetCamera()">Reset View</div>
  </div>
</div>

<!-- DATE -->
<div id="date-display" style="position:fixed;top:62px;right:22px;z-index:50;font-family:'Orbitron',monospace;font-size:10px;letter-spacing:1.5px;color:rgba(120,170,255,0.5);text-align:right;line-height:1.7;"></div>

<!-- MAIN CANVAS -->
<canvas id="c"></canvas>

<!-- TOOLTIP -->
<div id="tooltip"><div id="tt-name"></div><div id="tt-sub"></div></div>

<!-- SPEED PANEL -->
<div id="speed-panel">
  <div class="spd-btn" onclick="changeSpeed(-1)">−</div>
  <div id="speed-val">1× speed</div>
  <div class="spd-btn" onclick="changeSpeed(1)">+</div>
  <div id="pause-btn" onclick="togglePause()">Pause</div>
</div>

<!-- PLANET MODAL -->
<div id="planet-modal">
  <div id="modal-inner">
    <button id="modal-close" onclick="closeModal()">✕ &nbsp;CLOSE</button>
    <div id="planet-stage">
      <div id="atmo-glow"></div>
      <canvas id="three-canvas"></canvas>
    </div>
    <div id="planet-hint">drag to rotate · scroll to zoom · pinch on mobile</div>
    <div id="modal-name"></div>
    <div id="modal-subtitle"></div>
    <div id="stat-strip"></div>
    <div id="modal-info">
      <div id="modal-body">
        <div id="modal-facts"></div>
        <div id="modal-ai">
          <div id="modal-ai-label">AI Insight</div>
          <div id="modal-ai-text"><span class="dp"></span><span class="dp"></span><span class="dp"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════════════
// PLANET DATA
// ══════════════════════════════════════════════════
const PLANET_DATA = {
  sun:     { name:'The Sun',     sub:'Our star',                  glow:'#ff8800', orbitR:0,    size:3.2,  speed:0,      tilt:0,    texture:'https://www.solarsystemscope.com/textures/download/2k_sun.jpg',            facts:['A G-type main-sequence star 4.6 billion years old','Contains 99.8% of the solar system\'s total mass','Core temperature reaches 15 million °C'], stats:[{l:'Diameter',v:'1.39M km'},{l:'Age',v:'4.6B yrs'},{l:'Temp',v:'5,500°C'},{l:'Type',v:'G-star'}] },
  mercury: { name:'Mercury',     sub:'Closest to the Sun',        glow:'#aaa090', orbitR:6,    size:0.38, speed:0.041,  tilt:0.03, texture:'https://www.solarsystemscope.com/textures/download/2k_mercury.jpg',         facts:['A day on Mercury lasts 59 Earth days','Temperatures swing from −180°C to 430°C','No atmosphere to hold heat'], stats:[{l:'Diameter',v:'4,880 km'},{l:'Distance',v:'0.39 AU'},{l:'Day',v:'59 days'},{l:'Moons',v:'0'}] },
  venus:   { name:'Venus',       sub:'Hottest planet',            glow:'#e0a030', orbitR:9,    size:0.95, speed:0.016,  tilt:177,  texture:'https://www.solarsystemscope.com/textures/download/2k_venus_surface.jpg',    facts:['Hotter than Mercury despite being farther away','Spins backwards — retrograde rotation','A year is shorter than its own day'], stats:[{l:'Diameter',v:'12,104 km'},{l:'Distance',v:'0.72 AU'},{l:'Temp',v:'465°C'},{l:'Moons',v:'0'}] },
  earth:   { name:'Earth',       sub:'Our home',                  glow:'#1565c0', orbitR:13,   size:1.0,  speed:0.01,   tilt:23.4, texture:'https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg',      facts:['Only known planet with life and liquid water','The Moon stabilises Earth\'s axial tilt','Plate tectonics recycle carbon crucial for life'], stats:[{l:'Diameter',v:'12,742 km'},{l:'Distance',v:'1 AU'},{l:'Temp',v:'15°C avg'},{l:'Moons',v:'1'}] },
  mars:    { name:'Mars',        sub:'The red planet',            glow:'#d03020', orbitR:17,   size:0.53, speed:0.0053, tilt:25.2, texture:'https://www.solarsystemscope.com/textures/download/2k_mars.jpg',              facts:['Home to Olympus Mons — tallest volcano in the solar system','Has two small moons: Phobos and Deimos','Ancient riverbeds show water once flowed here'], stats:[{l:'Diameter',v:'6,779 km'},{l:'Distance',v:'1.52 AU'},{l:'Day',v:'24.6 hr'},{l:'Moons',v:'2'}] },
  jupiter: { name:'Jupiter',     sub:'Largest planet',            glow:'#c89050', orbitR:25,   size:2.2,  speed:0.00084,tilt:3.1,  texture:'https://www.solarsystemscope.com/textures/download/2k_jupiter.jpg',          facts:['Over 1,300 Earths could fit inside Jupiter','The Great Red Spot storm has raged 350+ years','Has 95 known moons including Ganymede — larger than Mercury'], stats:[{l:'Diameter',v:'139,820 km'},{l:'Distance',v:'5.2 AU'},{l:'Day',v:'10 hr'},{l:'Moons',v:'95'}] },
  saturn:  { name:'Saturn',      sub:'The ringed wonder',         glow:'#d4a830', orbitR:34,   size:1.85, speed:0.00034,tilt:26.7, texture:'https://www.solarsystemscope.com/textures/download/2k_saturn.jpg',            facts:['Its rings span 282,000 km but are only ~1 km thick','Low enough density to float on water','Has 146 moons including Titan with a thick atmosphere'], stats:[{l:'Diameter',v:'116,460 km'},{l:'Distance',v:'9.5 AU'},{l:'Day',v:'10.7 hr'},{l:'Moons',v:'146'}] },
  uranus:  { name:'Uranus',      sub:'The sideways planet',       glow:'#20c0d8', orbitR:42,   size:1.4,  speed:0.00012,tilt:97.8, texture:'https://www.solarsystemscope.com/textures/download/2k_uranus.jpg',            facts:['Rotates on its side — 98° axial tilt','Coldest planetary atmosphere: −224°C','Its rings were found in 1977 during a star occultation'], stats:[{l:'Diameter',v:'50,724 km'},{l:'Distance',v:'19.2 AU'},{l:'Day',v:'17.2 hr'},{l:'Moons',v:'27'}] },
  neptune: { name:'Neptune',     sub:'Windy world at the edge',   glow:'#1a35d8', orbitR:50,   size:1.35, speed:0.00006,tilt:28.3, texture:'https://www.solarsystemscope.com/textures/download/2k_neptune.jpg',           facts:['Fastest winds in the solar system — 2,100 km/h','Takes 165 Earth years for one orbit','Triton orbits backwards and will eventually break apart'], stats:[{l:'Diameter',v:'49,244 km'},{l:'Distance',v:'30.1 AU'},{l:'Year',v:'165 yrs'},{l:'Moons',v:'16'}] },
};

const PLANET_KEYS = ['sun','mercury','venus','earth','mars','jupiter','saturn','uranus','neptune'];

// ══════════════════════════════════════════════════
// THREE.JS ORRERY SETUP
// ══════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 40, 80);
camera.lookAt(0, 0, 0);

// Star background
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 8000; i++) {
  starVerts.push((Math.random() - 0.5) * 1800, (Math.random() - 0.5) * 1800, (Math.random() - 0.5) * 1800);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, sizeAttenuation: true, transparent: true, opacity: 0.85 })));

// Lighting
scene.add(new THREE.AmbientLight(0x111122, 0.6));
const sunLight = new THREE.PointLight(0xfff5e0, 3.5, 500);
scene.add(sunLight);

const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

// Planet meshes map
const planetMeshes = {};
const orbitLines = {};
const planetAngles = {};
let showOrbits = true;
let showLabels = true;

// ══════════════════════════════════════════════════
// LOAD TEXTURES + BUILD SCENE
// ══════════════════════════════════════════════════
const keys = PLANET_KEYS;
let loaded = 0;

function setLoadBar(pct, status) {
  document.getElementById('load-bar').style.width = pct + '%';
  document.getElementById('load-status').textContent = status;
}

function buildPlanet(key) {
  const d = PLANET_DATA[key];
  return new Promise(resolve => {
    loader.load(
      d.texture,
      tex => {
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
        let mat;
        if (key === 'sun') {
          mat = new THREE.MeshBasicMaterial({ map: tex });
        } else {
          mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.85, metalness: 0.05 });
        }
        const geo = new THREE.SphereGeometry(d.size, 64, 64);
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.z = THREE.MathUtils.degToRad(d.tilt);
        mesh.userData.key = key;

        // Position for non-sun planets
        if (key !== 'sun') {
          const angle = Math.random() * Math.PI * 2;
          planetAngles[key] = angle;
          mesh.position.set(Math.cos(angle) * d.orbitR, 0, Math.sin(angle) * d.orbitR);

          // Orbit ring
          const orbitGeo = new THREE.RingGeometry(d.orbitR - 0.04, d.orbitR + 0.04, 128);
          const orbitMat = new THREE.MeshBasicMaterial({ color: 0x334466, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
          const orbitMesh = new THREE.Mesh(orbitGeo, orbitMat);
          orbitMesh.rotation.x = Math.PI / 2;
          scene.add(orbitMesh);
          orbitLines[key] = orbitMesh;
        }

        // Saturn rings
        if (key === 'saturn') {
          loader.load('https://www.solarsystemscope.com/textures/download/2k_saturn_ring_alpha.png', ringTex => {
            const rGeo = new THREE.RingGeometry(d.size * 1.4, d.size * 2.4, 128);
            // UV fix for ring texture
            const pos = rGeo.attributes.position;
            const uv = rGeo.attributes.uv;
            for (let i = 0; i < pos.count; i++) {
              const v = new THREE.Vector3().fromBufferAttribute(pos, i);
              const r = v.length();
              uv.setXY(i, (r - d.size * 1.4) / (d.size), 0.5);
            }
            const rMat = new THREE.MeshBasicMaterial({ map: ringTex, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
            const ring = new THREE.Mesh(rGeo, rMat);
            ring.rotation.x = Math.PI / 2;
            mesh.add(ring);
          }, undefined, () => {
            // fallback plain ring
            const rGeo = new THREE.RingGeometry(d.size * 1.4, d.size * 2.4, 128);
            const rMat = new THREE.MeshBasicMaterial({ color: 0xc8a840, side: THREE.DoubleSide, transparent: true, opacity: 0.55 });
            const ring = new THREE.Mesh(rGeo, rMat);
            ring.rotation.x = Math.PI / 2;
            mesh.add(ring);
          });
        }

        // Sun glow
        if (key === 'sun') {
          const glowGeo = new THREE.SphereGeometry(d.size * 1.18, 32, 32);
          const glowMat = new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.12, side: THREE.BackSide });
          scene.add(new THREE.Mesh(glowGeo, glowMat));
          const glow2 = new THREE.SphereGeometry(d.size * 1.4, 32, 32);
          const gMat2 = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.05, side: THREE.BackSide });
          scene.add(new THREE.Mesh(glow2, gMat2));
        }

        scene.add(mesh);
        planetMeshes[key] = mesh;
        loaded++;
        const pct = Math.round((loaded / keys.length) * 100);
        setLoadBar(pct, 'Loading ' + d.name + '...');
        if (loaded === keys.length) onAllLoaded();
        resolve();
      },
      undefined,
      () => {
        // texture failed — use procedural fallback
        const colors = { sun:0xffaa00, mercury:0x888070, venus:0xe0b040, earth:0x2266bb, mars:0xcc3311, jupiter:0xc8a060, saturn:0xd4b040, uranus:0x40c8d8, neptune:0x1133cc };
        const mat = key === 'sun'
          ? new THREE.MeshBasicMaterial({ color: colors[key] })
          : new THREE.MeshStandardMaterial({ color: colors[key], roughness: 0.85 });
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(d.size, 48, 48), mat);
        mesh.rotation.z = THREE.MathUtils.degToRad(d.tilt);
        mesh.userData.key = key;
        if (key !== 'sun') {
          const angle = Math.random() * Math.PI * 2;
          planetAngles[key] = angle;
          mesh.position.set(Math.cos(angle) * d.orbitR, 0, Math.sin(angle) * d.orbitR);
          const orbitGeo = new THREE.RingGeometry(d.orbitR - 0.04, d.orbitR + 0.04, 128);
          const orbitMesh = new THREE.Mesh(orbitGeo, new THREE.MeshBasicMaterial({ color: 0x334466, side: THREE.DoubleSide, transparent: true, opacity: 0.4 }));
          orbitMesh.rotation.x = Math.PI / 2;
          scene.add(orbitMesh);
          orbitLines[key] = orbitMesh;
        }
        scene.add(mesh);
        planetMeshes[key] = mesh;
        loaded++;
        const pct = Math.round((loaded / keys.length) * 100);
        setLoadBar(pct, 'Loading ' + d.name + '...');
        if (loaded === keys.length) onAllLoaded();
        resolve();
      }
    );
  });
}

function onAllLoaded() {
  setLoadBar(100, 'Ready');
  setTimeout(() => {
    document.getElementById('loading').classList.add('fade');
    setTimeout(() => document.getElementById('loading').style.display = 'none', 1000);
  }, 400);
}

// Build all
keys.forEach(k => buildPlanet(k));

// ══════════════════════════════════════════════════
// LABELS (2D overlay using CSS)
// ══════════════════════════════════════════════════
const labelEls = {};
keys.forEach(k => {
  const el = document.createElement('div');
  el.className = 'planet-label';
  el.textContent = PLANET_DATA[k].name;
  el.style.cssText = `position:fixed;pointer-events:none;z-index:40;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1.5px;color:rgba(180,215,255,0.7);text-transform:uppercase;transform:translateX(-50%);text-shadow:0 0 8px rgba(100,160,255,0.6);`;
  document.body.appendChild(el);
  labelEls[k] = el;
});

function updateLabels() {
  const w = window.innerWidth, h = window.innerHeight;
  keys.forEach(k => {
    const mesh = planetMeshes[k];
    const el = labelEls[k];
    if (!mesh || !el) return;
    if (!showLabels) { el.style.display = 'none'; return; }
    const pos = mesh.position.clone().project(camera);
    const x = (pos.x * 0.5 + 0.5) * w;
    const y = (-pos.y * 0.5 + 0.5) * h;
    if (pos.z < 1 && x > 0 && x < w && y > 0 && y < h) {
      const d = PLANET_DATA[k];
      const offset = d.size * 60 + 14;
      el.style.display = 'block';
      el.style.left = x + 'px';
      el.style.top = (y + offset) + 'px';
    } else {
      el.style.display = 'none';
    }
  });
}

// ══════════════════════════════════════════════════
// CAMERA CONTROLS (pan + zoom)
// ══════════════════════════════════════════════════
let isDragging = false, lastMX = 0, lastMY = 0;
let camTheta = 0.3, camPhi = 0.7, camRadius = 90;
let targetTheta = camTheta, targetPhi = camPhi, targetRadius = camRadius;

function updateCamera() {
  camTheta += (targetTheta - camTheta) * 0.08;
  camPhi   += (targetPhi - camPhi) * 0.08;
  camRadius += (targetRadius - camRadius) * 0.08;
  camPhi = Math.max(0.05, Math.min(Math.PI / 2 - 0.05, camPhi));
  camRadius = Math.max(8, Math.min(300, camRadius));
  camera.position.set(
    camRadius * Math.sin(camPhi) * Math.sin(camTheta),
    camRadius * Math.cos(camPhi),
    camRadius * Math.sin(camPhi) * Math.cos(camTheta)
  );
  camera.lookAt(0, 0, 0);
}

canvas.addEventListener('mousedown', e => { isDragging = true; lastMX = e.clientX; lastMY = e.clientY; });
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
  targetTheta -= dx * 0.006;
  targetPhi   -= dy * 0.006;
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  targetRadius = Math.max(8, Math.min(300, targetRadius + e.deltaY * 0.15));
}, { passive: false });

// Touch
let t0 = null, t1 = null, initPinchDist = 0, initRadius = 90;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDragging = true; lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY; }
  else if (e.touches.length === 2) {
    isDragging = false;
    t0 = e.touches[0]; t1 = e.touches[1];
    initPinchDist = Math.hypot(t1.clientX - t0.clientX, t1.clientY - t0.clientY);
    initRadius = targetRadius;
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    targetTheta -= (e.touches[0].clientX - lastMX) * 0.006;
    targetPhi -= (e.touches[0].clientY - lastMY) * 0.006;
    lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
  } else if (e.touches.length === 2 && t1) {
    const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY);
    targetRadius = Math.max(8, Math.min(300, initRadius - (d - initPinchDist) * 0.25));
  }
}, { passive: false });
canvas.addEventListener('touchend', () => { isDragging = false; t1 = null; });

// ══════════════════════════════════════════════════
// RAYCASTING (click / hover)
// ══════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getMeshList() { return PLANET_KEYS.map(k => planetMeshes[k]).filter(Boolean); }

canvas.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getMeshList());
  const tt = document.getElementById('tooltip');
  if (hits.length) {
    const k = hits[0].object.userData.key;
    const d = PLANET_DATA[k];
    document.getElementById('tt-name').textContent = d.name;
    document.getElementById('tt-sub').textContent = d.sub;
    tt.style.display = 'block';
    tt.style.left = e.clientX + 'px';
    tt.style.top = e.clientY + 'px';
    canvas.style.cursor = 'pointer';
  } else {
    tt.style.display = 'none';
    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
  }
});

canvas.addEventListener('click', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getMeshList());
  if (hits.length) openPlanet(hits[0].object.userData.key);
});

// ══════════════════════════════════════════════════
// SPEED + PAUSE
// ══════════════════════════════════════════════════
let speedMultiplier = 1;
let paused = false;
const speeds = [0.1, 0.25, 0.5, 1, 2, 5, 10, 25, 50];
let speedIdx = 3;

function changeSpeed(dir) {
  speedIdx = Math.max(0, Math.min(speeds.length - 1, speedIdx + dir));
  speedMultiplier = speeds[speedIdx];
  document.getElementById('speed-val').textContent = speedMultiplier + '× speed';
}
function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pause-btn');
  btn.textContent = paused ? 'Resume' : 'Pause';
  btn.classList.toggle('paused', paused);
}
function toggleOrbits() {
  showOrbits = !showOrbits;
  Object.values(orbitLines).forEach(o => o.visible = showOrbits);
  document.getElementById('btn-orbits').classList.toggle('on', showOrbits);
}
function toggleLabels() {
  showLabels = !showLabels;
  document.getElementById('btn-labels').classList.toggle('on', showLabels);
}
function resetCamera() { targetTheta = 0.3; targetPhi = 0.7; targetRadius = 90; }

// ══════════════════════════════════════════════════
// DATE DISPLAY
// ══════════════════════════════════════════════════
let simTime = Date.now();
function updateDate() {
  const d = new Date(simTime);
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('date-display').innerHTML =
    `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}<br>${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} UTC`;
}

// ══════════════════════════════════════════════════
// MAIN ANIMATION LOOP
// ══════════════════════════════════════════════════
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (!paused) {
    const step = dt * speedMultiplier * 60;
    simTime += step * 1000 * 24 * 3600;

    PLANET_KEYS.forEach(k => {
      if (k === 'sun') return;
      const d = PLANET_DATA[k];
      const mesh = planetMeshes[k];
      if (!mesh) return;
      planetAngles[k] = (planetAngles[k] || 0) + d.speed * step;
      mesh.position.set(
        Math.cos(planetAngles[k]) * d.orbitR,
        0,
        Math.sin(planetAngles[k]) * d.orbitR
      );
      // self rotation
      mesh.rotation.y += 0.003 * step * (k === 'venus' ? -1 : 1);
    });
    // Sun rotation
    if (planetMeshes.sun) planetMeshes.sun.rotation.y += 0.001 * step;
  }

  updateCamera();

  // Update labels every few frames
  frameCount++;
  if (frameCount % 3 === 0) { updateLabels(); updateDate(); }

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ══════════════════════════════════════════════════
// PLANET MODAL (Three.js close-up)
// ══════════════════════════════════════════════════
let mRenderer, mScene, mCamera, mMesh, mRafId, mAbort;
let mDrag = false, mLX = 0, mLY = 0, mAutoSpin = true;
let mRotX = 0, mRotY = 0, mTX = 0, mTY = 0, mCamZ = 5, mTZ = 5;

function initModalRenderer() {
  const cv = document.getElementById('three-canvas');
  mRenderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true, alpha: true });
  const S = Math.min(cv.parentElement.offsetWidth, window.innerWidth * 0.82) | 0;
  mRenderer.setSize(S, S);
  mRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  mRenderer.setClearColor(0x000000, 0);

  mScene = new THREE.Scene();
  mCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  mCamera.position.set(0, 0, 5);
  mScene.add(new THREE.AmbientLight(0x223355, 0.7));
  const dl = new THREE.DirectionalLight(0xfff5e0, 2.8);
  dl.position.set(5, 3, 5);
  mScene.add(dl);

  // Controls
  const cv2 = cv;
  cv2.addEventListener('mousedown', e => { mDrag = true; mLX = e.clientX; mLY = e.clientY; mAutoSpin = false; });
  window.addEventListener('mouseup', () => mDrag = false);
  window.addEventListener('mousemove', e => { if (!mDrag) return; mTY += (e.clientX - mLX) * 0.008; mTX += (e.clientY - mLY) * 0.008; mLX = e.clientX; mLY = e.clientY; });
  cv2.addEventListener('wheel', e => { e.preventDefault(); mTZ = Math.max(2.5, Math.min(10, mTZ + e.deltaY * 0.008)); }, { passive: false });

  let pT0, pT1, pInitDist, pInitZ;
  cv2.addEventListener('touchstart', e => {
    e.preventDefault(); mAutoSpin = false;
    if (e.touches.length === 1) { mDrag = true; mLX = e.touches[0].clientX; mLY = e.touches[0].clientY; }
    else { mDrag = false; pT0 = e.touches[0]; pT1 = e.touches[1]; pInitDist = Math.hypot(pT1.clientX - pT0.clientX, pT1.clientY - pT0.clientY); pInitZ = mTZ; }
  }, { passive: false });
  cv2.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && mDrag) { mTY += (e.touches[0].clientX - mLX) * 0.008; mTX += (e.touches[0].clientY - mLY) * 0.008; mLX = e.touches[0].clientX; mLY = e.touches[0].clientY; }
    else if (e.touches.length === 2 && pT1) { const d = Math.hypot(e.touches[1].clientX - e.touches[0].clientX, e.touches[1].clientY - e.touches[0].clientY); mTZ = Math.max(2.5, Math.min(10, pInitZ - (d - pInitDist) * 0.02)); }
  }, { passive: false });
  cv2.addEventListener('touchend', () => { mDrag = false; pT1 = null; });
}

function mRenderLoop() {
  mRafId = requestAnimationFrame(mRenderLoop);
  if (!mMesh) return;
  if (mAutoSpin) { mMesh.rotation.y += 0.005; }
  else { mRotX += (mTX - mRotX) * 0.1; mRotY += (mTY - mRotY) * 0.1; mMesh.rotation.x = mRotX; mMesh.rotation.y = mRotY; }
  mCamZ += (mTZ - mCamZ) * 0.1;
  mCamera.position.z = mCamZ;
  mRenderer.render(mScene, mCamera);
}

function openPlanet(key) {
  const d = PLANET_DATA[key];
  document.getElementById('modal-name').textContent = d.name;
  document.getElementById('modal-subtitle').textContent = d.sub;
  document.getElementById('stat-strip').innerHTML = d.stats.map(s => `<div class="s-card"><span class="s-label">${s.l}</span><span class="s-val">${s.v}</span></div>`).join('');
  document.getElementById('modal-facts').innerHTML = d.facts.map(f => `<div class="fact-row"><div class="fact-dot"></div><div class="fact-text">${f}</div></div>`).join('');
  document.getElementById('atmo-glow').style.background = `radial-gradient(circle,${d.glow}55 0%,${d.glow}18 55%,transparent 78%)`;

  const aiEl = document.getElementById('modal-ai-text');
  aiEl.innerHTML = '<span class="dp"></span><span class="dp"></span><span class="dp"></span>';

  const modal = document.getElementById('planet-modal');
  modal.classList.remove('closing'); modal.style.display = 'block'; modal.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  // Reset modal controls
  mAutoSpin = true; mRotX = 0; mRotY = 0; mTX = 0; mTY = 0; mCamZ = 5; mTZ = 5;

  if (!mRenderer) initModalRenderer();
  if (mRafId) cancelAnimationFrame(mRafId);

  // Clear old mesh
  while (mScene.children.length > 3) mScene.remove(mScene.children[mScene.children.length - 1]);

  // Load real texture for close-up
  loader.load(d.texture, tex => {
    tex.anisotropy = mRenderer.capabilities.getMaxAnisotropy();
    const mat = key === 'sun'
      ? new THREE.MeshBasicMaterial({ map: tex })
      : new THREE.MeshStandardMaterial({ map: tex, roughness: 0.8, metalness: 0.05 });
    mMesh = new THREE.Mesh(new THREE.SphereGeometry(1.8, 64, 64), mat);
    mMesh.rotation.z = THREE.MathUtils.degToRad(d.tilt);
    mScene.add(mMesh);

    // Sun glow
    if (key === 'sun') {
      mScene.add(new THREE.Mesh(new THREE.SphereGeometry(2.1, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.1, side: THREE.BackSide })));
    }
    // Saturn rings
    if (key === 'saturn') {
      loader.load('https://www.solarsystemscope.com/textures/download/2k_saturn_ring_alpha.png', rt => {
        const rg = new THREE.RingGeometry(2.4, 4.0, 128);
        const pos = rg.attributes.position;
        const uv = rg.attributes.uv;
        for (let i = 0; i < pos.count; i++) {
          const v = new THREE.Vector3().fromBufferAttribute(pos, i);
          uv.setXY(i, (v.length() - 2.4) / 1.6, 0.5);
        }
        const rm = new THREE.MeshBasicMaterial({ map: rt, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
        const ring = new THREE.Mesh(rg, rm);
        ring.rotation.x = Math.PI / 2;
        mMesh.add(ring);
      }, undefined, () => {
        const ring = new THREE.Mesh(new THREE.RingGeometry(2.4, 4.0, 128), new THREE.MeshBasicMaterial({ color: 0xd4a840, side: THREE.DoubleSide, transparent: true, opacity: 0.6 }));
        ring.rotation.x = Math.PI / 2;
        mMesh.add(ring);
      });
    }
    // Atmosphere glow for some planets
    if (['earth','venus','uranus','neptune'].includes(key)) {
      const atmoColors = { earth:0x4488ff, venus:0xffcc44, uranus:0x40d0e8, neptune:0x2244ff };
      mScene.add(new THREE.Mesh(new THREE.SphereGeometry(2.05, 32, 32), new THREE.MeshBasicMaterial({ color: atmoColors[key], transparent: true, opacity: 0.1, side: THREE.BackSide })));
    }
    mRenderLoop();
  }, undefined, () => {
    // fallback
    const colors = { sun:0xffaa00, mercury:0x888070, venus:0xe0b040, earth:0x2266bb, mars:0xcc3311, jupiter:0xc8a060, saturn:0xd4b040, uranus:0x40c8d8, neptune:0x1133cc };
    mMesh = new THREE.Mesh(new THREE.SphereGeometry(1.8, 48, 48), new THREE.MeshStandardMaterial({ color: colors[key], roughness: 0.85 }));
    mScene.add(mMesh);
    mRenderLoop();
  });

  // AI
  if (mAbort) mAbort.abort();
  mAbort = new AbortController();
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: `Give one mind-blowing lesser-known fact about ${d.name} in 2-3 sentences. Be poetic and awe-inspiring. Flowing prose, no bullets.` }] }),
    signal: mAbort.signal
  }).then(r => r.json()).then(data => {
    aiEl.textContent = data.content?.[0]?.text || 'The cosmos keeps its secrets close.';
  }).catch(e => { if (e.name !== 'AbortError') aiEl.textContent = 'The universe holds infinite wonder.'; });
}

function closeModal() {
  const modal = document.getElementById('planet-modal');
  modal.classList.add('closing');
  if (mRafId) { cancelAnimationFrame(mRafId); mRafId = null; }
  setTimeout(() => { modal.style.display = 'none'; document.body.style.overflow = ''; }, 260);
}

document.getElementById('planet-modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
